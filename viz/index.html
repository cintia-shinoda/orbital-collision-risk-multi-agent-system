<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbital Collision Risk — Cosmos 2251</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #title {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      color: #fff; font-family: sans-serif; background: rgba(0,0,0,0.55);
      padding: 8px 12px; border-radius: 6px; max-width: 360px;
    }
    #title h1 { margin: 0 0 4px; font-size: 16px; }
    #title p { margin: 0; font-size: 12px; opacity: 0.85; }
    .legend { margin-top: 6px; font-size: 11px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="title">
    <h1>Orbital Collision Risk</h1>
    <p>Target: COSMOS 2251 (NORAD 22675) and its actionable-risk debris neighbours.</p>
    <div class="legend">
      <span class="dot" style="background:#ffff00"></span>Target
      <span class="dot" style="background:#ff5a28; margin-left:10px"></span>Risk debris
      <span class="dot" style="background:#ff0000; margin-left:10px"></span>Conjunction at TCA
    </div>
  </div>

  <script>
    const viewer = new Cesium.Viewer("cesiumContainer", {
      baseLayer: Cesium.ImageryLayer.fromProviderAsync(
        Cesium.TileMapServiceImageryProvider.fromUrl(
          Cesium.buildModuleUrl("Assets/Textures/NaturalEarthII")
        )
      ),
      baseLayerPicker: false,
      geocoder: false,
      shouldAnimate: true,
    });

    viewer.scene.globe.enableLighting = true;

    Cesium.CzmlDataSource.load("orbits.czml").then((dataSource) => {
      viewer.dataSources.add(dataSource);
      viewer.clock.multiplier = 800;
      viewer.timeline.zoomTo(dataSource.clock.startTime, dataSource.clock.stopTime);
      viewer.flyTo(dataSource);
    }).catch((err) => console.error("CZML load error:", err));
  </script>
</body>
</html>
